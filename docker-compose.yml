# Local Postgres for manually testing pgnudge (both transports).
#
#   docker compose up -d --build
#   PGHOST=127.0.0.1 PGPORT=5432 PGUSER=pgnudge PGDATABASE=pgnudge \
#     PGPASSWORD=pgnudge uv run pgnudge watch logical      # WalFeed  (wal2json)
#     PGPASSWORD=pgnudge uv run pgnudge watch physical     # RawFeed  (slot-less)
#
# Poke it from a second shell to see nudges:
#   docker compose exec postgres psql -U pgnudge -d pgnudge \
#     -c 'create table if not exists t(id int); insert into t values (1);'
#
# tmpfs data => every `up` re-runs initdb, so the hba init script always applies.
services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.wal2json
    command:
    - postgres
    - -c
    - wal_level=logical
    - -c
    - max_connections=500
    ports:
    - "5432:5432"
    tmpfs:
    - /var/lib/postgresql/data
    environment:
      POSTGRES_DB: pgnudge
      POSTGRES_USER: pgnudge
      POSTGRES_PASSWORD: pgnudge
    volumes:
    - ./docker/init-replication-hba.sh:/docker-entrypoint-initdb.d/init-replication-hba.sh:ro
    restart: "no"
