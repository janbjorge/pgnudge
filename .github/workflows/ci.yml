name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13", "3.14"]
        postgres: ["16", "17", "18"]
    env:
      POSTGRES_IMAGE: postgres:${{ matrix.postgres }}
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync
      # 100% line+branch locally; 98 leaves headroom for the TLS-dependent
      # lines when the container's best-effort TLS setup fails. Benchmarks are
      # perf-only and PG-independent, so they run once in the `benchmark` job,
      # not across every matrix cell.
      - run: uv run pytest -q -m "not benchmark" --cov=pgnudge --cov-report=term-missing --cov-fail-under=98

  # parser throughput, no PostgreSQL; runs once, not per matrix cell
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync
      - run: >-
          uv run pytest -m benchmark --benchmark-only
          --benchmark-group-by=func
          --benchmark-columns=min,median,ops,rounds
          --benchmark-sort=mean

  # keeps the wal2json path honest (default matrix runs test_decoding)
  test-wal2json:
    runs-on: ubuntu-latest
    env:
      POSTGRES_IMAGE: pgnudge-wal2json:16
      PGNUDGE_PLUGIN: wal2json
    steps:
      - uses: actions/checkout@v7
      # no public image ships wal2json for PG 16 (debezium/postgres dropped it),
      # so build one: official postgres + the PGDG package
      - run: |
          docker build -t pgnudge-wal2json:16 - <<'EOF'
          FROM postgres:16
          RUN apt-get update -o Dir::Etc::sourcelist="sources.list.d/pgdg.list" -o Dir::Etc::sourceparts="-" \
              && apt-get install -y --no-install-recommends postgresql-16-wal2json \
              && rm -rf /var/lib/apt/lists/*
          EOF
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync
      - run: uv run pytest -q -m "not benchmark" --cov=pgnudge --cov-report=term-missing --cov-fail-under=98
