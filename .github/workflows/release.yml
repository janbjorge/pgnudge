name: Release

on:
  push:
    tags: ["v*"]

# never let two tag pushes publish at once; do not cancel a mid-publish run
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write   # PyPI trusted publishing (OIDC)
      contents: write   # create the GitHub Release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0   # hatch-vcs derives the version from the tag; needs full history + tags
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.11.19"
      # build ONCE: hatch-vcs stamps the version from the tag; this exact
      # artifact is what gets tested and published
      - run: uv build
      # hatch-vcs derives the version via `git describe`, which can resolve to a
      # tag OTHER than the one that triggered this run (e.g. two tags on one
      # commit). Refuse to publish unless the built artifact's version is
      # exactly the release tag, so a mismatch fails here instead of shipping
      # the wrong version.
      - run: |
          expected="${GITHUB_REF_NAME#v}"
          if [ ! -f "dist/pgnudge-${expected}-py3-none-any.whl" ]; then
            echo "::error::built version does not match tag ${GITHUB_REF_NAME}; dist contains:"
            ls -1 dist
            exit 1
          fi
      # metadata + README render check before it can reach PyPI
      - run: uvx twine check dist/*
      # the zero-footprint proof is the product: run the live suite from the
      # INSTALLED wheel (not editable src), against a real PG (testcontainers),
      # so the artifact that ships is the artifact that was proven
      - run: uv venv .wheelenv
      - run: uv pip install --python .wheelenv/bin/python dist/*.whl --group dev
      - run: .wheelenv/bin/python -m pytest -q -m "not benchmark"
      # publish the exact artifact just proven above
      - run: uv publish --trusted-publishing always
      # cut a GitHub Release from the tag: auto notes + the built artifacts.
      # idempotent so a re-run after a successful publish does not hard-fail on
      # an already-existing release
      - run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --verify-tag
          fi
        env:
          GH_TOKEN: ${{ github.token }}
