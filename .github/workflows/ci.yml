name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.13", "3.14"]
        postgres: ["16", "17", "18"]
    env:
      POSTGRES_IMAGE: postgres:${{ matrix.postgres }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync
      - run: uv run pytest -q

  # keeps the wal2json path honest (default matrix runs test_decoding)
  test-wal2json:
    runs-on: ubuntu-latest
    env:
      POSTGRES_IMAGE: debezium/postgres:16
      PGWAKE_PLUGIN: wal2json
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run pytest -q
