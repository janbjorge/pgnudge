name: Release

on:
  push:
    tags: ["v*"]

# never let two tag pushes publish at once; do not cancel a mid-publish run
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write   # PyPI trusted publishing (OIDC)
      contents: write   # create the GitHub Release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.11.19"
      # a tag/version mismatch would burn the PyPI version for good
      - run: test "v$(uv version --short)" = "$GITHUB_REF_NAME"
      # build ONCE: this exact artifact is what gets tested and published
      - run: uv build
      # metadata + README render check before it can reach PyPI
      - run: uvx twine check dist/*
      # the zero-footprint proof is the product: run the live suite from the
      # INSTALLED wheel (not editable src), against a real PG (testcontainers),
      # so the artifact that ships is the artifact that was proven
      - run: uv venv .wheelenv
      - run: uv pip install --python .wheelenv/bin/python dist/*.whl --group dev
      - run: .wheelenv/bin/python -m pytest -q -m "not benchmark"
      # publish the exact artifact just proven above
      - run: uv publish --trusted-publishing always
      # cut a GitHub Release from the tag: auto notes + the built artifacts
      - run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
